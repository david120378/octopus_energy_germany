name: "Octopus Energy Deutschland"
description: "Ruft Rechnungs- und Verbrauchsdaten von Octopus Energy Deutschland ab und veröffentlicht sie via MQTT."
version: "0.5.14"
slug: "octopus_energy"
init: false
arch:
  - aarch64
  - amd64
startup: services
boot: auto
map:
  - share:rw

options:
  email: ""
  password: ""
  account_number: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  mqtt_topic_prefix: "octopus_energy"
  fetch_interval_minutes: 60

schema:
  email: str
  password: str
  account_number: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  mqtt_topic_prefix: str
  fetch_interval_minutes: int
